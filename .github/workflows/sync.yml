name: Sincronización Automática de Desaparecidos y Noticias

on:
  schedule:
    # Se ejecuta cada 30 minutos de forma totalmente automática
    - cron: '*/30 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    # Permite ejecutar la sincronización manualmente con un botón en GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar Dependencias de Playwright
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install --with-deps chromium

    - name: Ejecutar Script de Sincronización y Crawler de Noticias
      run: |
        python js/sync_persons.py
        python js/crawl_news.py

    - name: Subir Cambios a GitHub si hay Actualizaciones
      run: |
        git config --global user.name "Marketshopusa Autocommit"
        git config --global user.email "marketshopusa-bot@github.com"
        git add scraped_persons_all.json scraped_persons_mini.json official_data.json
        # Solo hacer commit si hay cambios detectados
        if git diff --staged --quiet; then
          echo "No hay nuevos registros ni noticias. Todo al día."
        else
          git commit -m "Autosync: Actualización automática de desaparecidos, noticias y cifras oficiales"
          git push
        fi
